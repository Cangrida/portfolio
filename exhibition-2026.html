<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Галина Гольтяпина — Выставка 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0b; color:#f0ece4; font-family:'Montserrat',sans-serif; overflow:hidden; }

#intro {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#0a0a0b; transition:opacity 1.2s ease;
}
#intro.fade-out { opacity:0; pointer-events:none; }
.intro-year { font-weight:200; font-size:0.65rem; letter-spacing:0.5em; color:rgba(255,107,53,0.6); text-transform:uppercase; margin-bottom:24px; }
.intro-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(3rem,8vw,6rem); letter-spacing:0.08em; color:#f0ece4; margin-bottom:8px; }
.intro-author { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.1rem; color:rgba(240,236,228,0.45); letter-spacing:0.2em; margin-bottom:60px; }
.intro-line { width:1px; height:60px; background:linear-gradient(to bottom,rgba(255,107,53,0.8),transparent); margin-bottom:40px; }
#enter-btn { font-family:'Montserrat',sans-serif; font-weight:300; font-size:0.7rem; letter-spacing:0.4em; text-transform:uppercase; color:#f0ece4; background:transparent; border:1px solid rgba(255,107,53,0.5); padding:16px 48px; cursor:pointer; transition:all 0.4s ease; }
#enter-btn:hover { border-color:rgba(255,107,53,0.9); color:#ff6b35; }
.intro-controls { position:absolute; bottom:40px; font-size:0.6rem; letter-spacing:0.25em; color:rgba(240,236,228,0.25); text-align:center; line-height:2; }
.intro-controls span { color:rgba(255,107,53,0.5); }

#hud { position:fixed; inset:0; z-index:10; pointer-events:none; display:none; }
#hud.active { display:block; }
#hud-top { position:absolute; top:28px; left:50%; transform:translateX(-50%); font-size:0.55rem; letter-spacing:0.4em; color:rgba(255,107,53,0.4); text-transform:uppercase; }
#room-label { position:absolute; bottom:36px; left:50%; transform:translateX(-50%); font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; color:rgba(240,236,228,0.35); letter-spacing:0.15em; transition:opacity 0.5s; }
#crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:16px; height:16px; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:rgba(255,107,53,0.5); }
#crosshair::before { width:1px; height:100%; left:50%; }
#crosshair::after  { width:100%; height:1px; top:50%; }
#interact-prompt { position:absolute; bottom:80px; left:50%; transform:translateX(-50%); font-size:0.6rem; letter-spacing:0.3em; color:rgba(255,107,53,0.8); opacity:0; transition:opacity 0.3s; }

#artwork-panel { position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; background:rgba(10,10,11,0.92); backdrop-filter:blur(12px); pointer-events:none; }
#artwork-panel.open { display:flex; pointer-events:all; }
.panel-inner { max-width:900px; width:92%; display:flex; gap:48px; align-items:center; }
.panel-img-wrap { flex:0 0 auto; max-width:55%; max-height:80vh; border:1px solid rgba(255,107,53,0.2); overflow:hidden; }
#panel-img { width:100%; max-height:80vh; object-fit:contain; display:block; }
#panel-video { width:100%; max-height:80vh; display:none; }
.panel-info { flex:1; }
.panel-cat { font-size:0.55rem; letter-spacing:0.4em; color:rgba(255,107,53,0.6); text-transform:uppercase; margin-bottom:16px; }
.panel-title { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2rem; line-height:1.2; color:#f0ece4; margin-bottom:12px; }
.panel-desc { font-size:0.75rem; line-height:1.8; color:rgba(240,236,228,0.5); margin-bottom:32px; }
.panel-close { font-size:0.6rem; letter-spacing:0.35em; color:rgba(255,107,53,0.6); cursor:pointer; background:none; border:none; font-family:'Montserrat',sans-serif; text-transform:uppercase; padding:12px 0; transition:color 0.3s; }
.panel-close:hover { color:#ff6b35; }

#pause-screen { position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:rgba(10,10,11,0.7); backdrop-filter:blur(4px); }
#pause-screen.active { display:flex; }
#pause-screen p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.8rem; color:rgba(240,236,228,0.4); letter-spacing:0.1em; }

canvas { display:block; }

/* ── МОБИЛЬНОЕ УПРАВЛЕНИЕ ── */
#mobile-controls { display:none; }

@media (pointer:coarse), (max-width:768px) {
  #mobile-controls { display:block; }
  .intro-controls { display:none; }
}

/* Джойстик движения — левый нижний угол */
#joystick-zone {
  position:fixed; left:24px; bottom:24px; z-index:20;
  width:110px; height:110px;
  pointer-events:all;
}
#joystick-base {
  width:110px; height:110px; border-radius:50%;
  background:rgba(255,107,53,0.12);
  border:1px solid rgba(255,107,53,0.3);
  position:relative;
}
#joystick-stick {
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,107,53,0.5);
  border:1px solid rgba(255,107,53,0.8);
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  transition: box-shadow 0.1s;
}

/* Кнопка взаимодействия — правый нижний угол */
#btn-interact {
  position:fixed; right:24px; bottom:24px; z-index:20;
  width:64px; height:64px; border-radius:50%;
  background:rgba(255,107,53,0.15);
  border:1px solid rgba(255,107,53,0.5);
  color:rgba(255,107,53,0.9);
  font-size:0.6rem; letter-spacing:0.1em;
  font-family:'Montserrat',sans-serif;
  display:flex; align-items:center; justify-content:center;
  pointer-events:all; cursor:pointer;
  transition: background 0.2s;
}
#btn-interact:active { background:rgba(255,107,53,0.35); }
#btn-interact.hidden { opacity:0; pointer-events:none; }

/* Панель на мобильном — вертикально */
@media (max-width:768px) {
  .panel-inner { flex-direction:column; gap:24px; overflow-y:auto; max-height:90vh; }
  .panel-img-wrap { max-width:100%; width:100%; }
  .panel-title { font-size:1.4rem; }
}

<script>
// ═══════════════════════════════════════════════════════
// ДАННЫЕ РАБОТ
// ═══════════════════════════════════════════════════════

// ЗАЛ I — Скетчи (вертикальные, ~1182×1406)
const SKETCHES = [
  { id:'s1',  title:'1. 2026',  cat:'', desc:'', src:'1.jpg',   w:1182, h:1406 },
  { id:'s2',  title:'2. 2026',  cat:'', desc:'', src:'2.jpg',   w:1182, h:1406 },

  { id:'s17', title:'17. 2026', cat:'', desc:'', src:'s12.jpg', w:1182, h:1406 },

// ЗАЛ II — Иллюстрации (реальные пропорции)
const ILLUSTRATIONS = [
  { id:'i1', title:'И даже смерть не разлучит нас. 2026', cat:'', desc:'', src:'hero.jpg',    w:2400, h:1476 },
  { id:'i2', title:'Доктор Богомол. 2026',                 cat:'', desc:'', src:'mantis.jpg',  w:2500, h:2057 },
  { id:'i3', title:'Fungi. Фаина с 14 февраля! 2026',      cat:'', desc:'', src:'faina.jpg',   w:1966, h:2079 },
  { id:'i4', title:'Похоть. 2026',                         cat:'', desc:'', src:'lust.jpg',    w:1800, h:1050 },
  { id:'i5', title:'Лень. 2026',                           cat:'', desc:'', src:'sloth.jpg',   w:1800, h:1050 },
  { id:'i6', title:'Гнев. 2026',                           cat:'', desc:'', src:'wrath.jpg',   w:1800, h:1050 },
  { id:'i7', title:'Вархаммер Пиратка. 2026',              cat:'', desc:'', src:'пиратка.jpg', w:1800, h:2500 },
  { id:'i8', title:'Анатомия. 2026',                       cat:'', desc:'', src:'anatomy.jpg', w:2746, h:1795 },
  { id:'i9', title:'Ричард Бах. 2026',                     cat:'', desc:'', src:'bach.jpg',    w:2746, h:1900 },
];

// ЗАЛ II — тумбы для 3D
const PEDESTALS_3D = [
  { id:'3d1', title:'Арбалет. 14 февраля. 2026', cat:'3D · Blender' },
  { id:'3d2', title:'Сани Санты. 2026',           cat:'3D · Blender' },
  { id:'3d3', title:'Робот. 2026',                 cat:'3D · Blender' },
];

// ЗАЛ II — анимации на стене (заглушки)
const ANIMATIONS = [
  { id:'a1', title:'Анимация · Скоро', cat:'Spine · Unity · 2026', desc:'Анимация появится здесь.', src:null, w:1, h:1 },
  { id:'a2', title:'Анимация · Скоро', cat:'Spine · Unity · 2026', desc:'Анимация появится здесь.', src:null, w:1, h:1 },
];

// ═══════════════════════════════════════════════════════
// КОНСТАНТЫ
// ═══════════════════════════════════════════════════════
const HALL1_W = 7, HALL1_H = 5;
const SKETCH_SPACING = 3.4;
const HALL1_LEN = SKETCH_SPACING * 9 + 3;

const HALL2_W = 14, HALL2_H = 5, HALL2_LEN = 16;

// Залы вплотную без коридора
const H1_Z  = 0;
const H2_Z  = -(HALL1_LEN/2 + HALL2_LEN/2);

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.4;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080809);
scene.fog = new THREE.Fog(0x080809, 20, 45);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 80);
camera.position.set(0, 1.7, HALL1_LEN/2 - 1.5);

// ═══════════════════════════════════════════════════════
// МАТЕРИАЛЫ
// ═══════════════════════════════════════════════════════
const matWall  = new THREE.MeshStandardMaterial({ color:0x1c1c1f, roughness:0.95 });
const matFloor = new THREE.MeshStandardMaterial({ color:0x111113, roughness:0.85 });
const matCeil  = new THREE.MeshStandardMaterial({ color:0x0e0e10, roughness:1.0  });
const matFrame = new THREE.MeshStandardMaterial({ color:0x2a2215, roughness:0.6, metalness:0.3 });
const matPed   = new THREE.MeshStandardMaterial({ color:0x252525, roughness:0.7, metalness:0.1 });

// ═══════════════════════════════════════════════════════
// СТРОИМ ГЕОМЕТРИЮ ЗАЛА
// ═══════════════════════════════════════════════════════
function addBox(w,h,d,x,y,z,mat,ry=0){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.rotation.y=ry;
  m.receiveShadow=true; scene.add(m); return m;
}
function addPlane(w,d,x,y,z,mat,rx=0,ry=0){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.position.set(x,y,z); m.rotation.x=rx; m.rotation.y=ry;
  m.receiveShadow=true; scene.add(m); return m;
}

// ── ЗАЛ I ──
function buildHall1(){
  const z = H1_Z;
  addPlane(HALL1_W, HALL1_LEN, 0,0,z, matFloor,-Math.PI/2);
  addPlane(HALL1_W, HALL1_LEN, 0,HALL1_H,z, matCeil,Math.PI/2);
  addPlane(HALL1_LEN,HALL1_H, -HALL1_W/2, HALL1_H/2,z, matWall, 0,Math.PI/2);
  addPlane(HALL1_LEN,HALL1_H,  HALL1_W/2, HALL1_H/2,z, matWall, 0,-Math.PI/2);
  // Торец дальний убран — открытый проход в коридор
  // Торец ближний (вход/выход назад) — не рисуем, открыт

  // Освещение
  scene.add(new THREE.AmbientLight(0x1a1510,0.25));
  for(let i=0;i<5;i++){
    const lz = z + HALL1_LEN/2 - 2 - i*(HALL1_LEN/4.5);
    const pt = new THREE.PointLight(0xfff0d8,0.3,14);
    pt.position.set(0,HALL1_H-0.3,lz); scene.add(pt);
  }
}


// ── ЗАЛ II ──
function buildHall2(){
  const z = H2_Z;
  addPlane(HALL2_W, HALL2_LEN, 0,0,z, matFloor,-Math.PI/2);
  addPlane(HALL2_W, HALL2_LEN, 0,HALL2_H,z, matCeil,Math.PI/2);
  addPlane(HALL2_LEN,HALL2_H, -HALL2_W/2, HALL2_H/2,z, matWall,0,Math.PI/2);
  addPlane(HALL2_LEN,HALL2_H,  HALL2_W/2, HALL2_H/2,z, matWall,0,-Math.PI/2);
  addPlane(HALL2_W, HALL2_H, 0,HALL2_H/2,z-HALL2_LEN/2, matWall);

  // Освещение зала II
  for(let i=0;i<4;i++){
    const lz = z + HALL2_LEN/2 - 2.5 - i*(HALL2_LEN/3.5);
    const pt = new THREE.PointLight(0xfff0d8,0.35,16);
    pt.position.set(0,HALL2_H-0.3,lz); scene.add(pt);
  }
}

buildHall1();
buildHall2();


// ═══════════════════════════════════════════════════════
// УТИЛИТЫ ДЛЯ КАРТИН
// ═══════════════════════════════════════════════════════
const texLoader = new THREE.TextureLoader();
const allMeshes = []; // { mesh, artwork }
const spinners  = []; // тумбы
const hall1Objects = []; // объекты Зала I
const hall2Objects = []; // объекты Зала II

function canvasFor(art, error=false){
  const ratio = art.w / art.h;
  const cw = 512, ch = Math.round(512/ratio);
  const c = document.createElement('canvas');
  c.width=cw; c.height=ch;
  const cx = c.getContext('2d');
  cx.fillStyle = error ? '#180a0a' : '#1a1714';
  cx.fillRect(0,0,cw,ch);
  cx.strokeStyle='rgba(255,107,53,0.2)'; cx.lineWidth=1;
  cx.strokeRect(10,10,cw-20,ch-20);
  cx.fillStyle = error ? 'rgba(255,80,50,0.6)' : 'rgba(255,107,53,0.3)';
  cx.font=`${Math.min(ch*0.18,60)}px serif`; cx.textAlign='center';
  cx.fillText(error ? '?' : art.id, cw/2, ch*0.45);
  cx.fillStyle='rgba(240,236,228,0.35)';
  cx.font=`${Math.min(ch*0.06,16)}px sans-serif`;
  cx.fillText(error ? 'не найден: '+art.src : art.title, cw/2, ch*0.6);
  return new THREE.CanvasTexture(c);
}

function artwork3dSize(art, maxW, maxH){
  const ratio = art.w / art.h;
  let w = maxW, h = maxW/ratio;
  if(h > maxH){ h=maxH; w=maxH*ratio; }
  return { w, h };
}

function placeArtwork(art, px, py, pz, ry, maxW=2.4, maxH=2.4){
  const { w, h } = artwork3dSize(art, maxW, maxH);
  const FRAME=0.06;

  // Рамка
  const fm = new THREE.Mesh(
    new THREE.BoxGeometry(w+FRAME*2, h+FRAME*2, 0.05), matFrame);
  fm.position.set(px,py,pz); fm.rotation.y=ry;
  scene.add(fm);

  // Холст
  const mat = new THREE.MeshStandardMaterial({ color:0x1a1714, roughness:0.85 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w,h), mat);
  const off = 0.035;
  const ox = ry===Math.PI/2?off:ry===-Math.PI/2?-off:0;
  const oz = ry===0?off:ry===Math.PI?-off:0;
  mesh.position.set(px+ox,py,pz+oz); mesh.rotation.y=ry;
  scene.add(mesh);

  texLoader.load(art.src,
    (tex)=>{ tex.encoding=THREE.sRGBEncoding; mat.map=tex; mat.color.set(0xffffff); mat.needsUpdate=true; },
    undefined,
    ()=>{ mat.map=canvasFor(art,true); mat.color.set(0xffffff); mat.needsUpdate=true; }
  );

  // Спотлайт
  const spot = new THREE.SpotLight(0xfff0d8,2.5,8,Math.PI/5,0.25,1);
  const sx = ry===Math.PI/2?px+2.0:ry===-Math.PI/2?px-2.0:px;
  const sz = ry===0?pz+2.0:ry===Math.PI?pz-2.0:pz;
  spot.position.set(sx,HALL1_H-0.3,sz);
  spot.target=mesh; scene.add(spot); scene.add(spot.target);

  // Табличка
  const lc=document.createElement('canvas'); lc.width=360; lc.height=52;
  const lx=lc.getContext('2d');
  lx.fillStyle='#1c1c1f'; lx.fillRect(0,0,360,52);
  lx.fillStyle='rgba(255,107,53,0.8)'; lx.font='13px sans-serif'; lx.textAlign='center';
  lx.fillText(art.cat,180,18);
  lx.fillStyle='rgba(240,236,228,0.5)'; lx.font='12px sans-serif';
  lx.fillText(art.title,180,36);
  const lm=new THREE.Mesh(new THREE.PlaneGeometry(1.1,0.15),
    new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(lc),roughness:0.9}));
  lm.position.set(px+ox, py-h/2-0.13, pz+oz); lm.rotation.y=ry;
  scene.add(lm);

  allMeshes.push({mesh,artwork:art});
}

// ═══════════════════════════════════════════════════════

function buildPedestal(x,z,art){
  // Тумба
  const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,1.0,20),matPed);
  cyl.position.set(x,0.5,z); scene.add(cyl);
  const top=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,0.05,20),matPed);
  top.position.set(x,1.02,z); scene.add(top);

  // место для GLB модели

  // Подсветка тумбы
  const pl=new THREE.PointLight(0xff8844,1.8,3.5);
  pl.position.set(x,2.3,z); scene.add(pl);

  // Табличка спереди тумбы — вертикальная, хорошо видна
  const lc=document.createElement('canvas'); lc.width=512; lc.height=128;
  const lx=lc.getContext('2d');
  lx.fillStyle='#1c1c1f'; lx.fillRect(0,0,512,128);
  lx.strokeStyle='rgba(255,107,53,0.5)'; lx.lineWidth=2;
  lx.strokeRect(6,6,500,116);
  lx.fillStyle='rgba(255,107,53,0.9)'; lx.font='bold 32px Arial,sans-serif'; lx.textAlign='center';
  // Перенос строки если название длинное
  const words = art.title.split(' ');
  let line1 = '', line2 = '';
  words.forEach(w => { if((line1+' '+w).length < 22) line1+=(line1?'  ':'')+w; else line2+=(line2?' ':'')+w; });
  if(line2){
    lx.fillText(line1, 256, 52);
    lx.fillStyle='rgba(240,236,228,0.7)'; lx.font='24px Arial,sans-serif';
    lx.fillText(line2, 256, 90);
  } else {
    lx.fillText(art.title, 256, 72);
  }
  const lm=new THREE.Mesh(
    new THREE.PlaneGeometry(0.72, 0.18),
    new THREE.MeshStandardMaterial({
      map:new THREE.CanvasTexture(lc), roughness:0.8,
      emissive: new THREE.Color(0x0a0600), emissiveIntensity:0.6
    })
  );
  lm.position.set(x, 0.6, z+0.36); // спереди тумбы, на уровне глаз
  scene.add(lm);
}

// Загружаем арбалет над первой тумбой
(function(){
  const gltfLoader = new THREE.GLTFLoader();
  const targetX = -3, targetZ = H2_Z+3, floatY = 1.3;

  gltfLoader.load(
    'арбалет.glb',
    (gltf) => {
      const model = gltf.scene;

      // Автомасштаб — вписываем в куб ~0.8
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 0.8 / maxDim;
      model.scale.setScalar(scale);

      // Центрируем и поднимаем над тумбой
      box.setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const sizeScaled = box.getSize(new THREE.Vector3());
      model.position.x = targetX - center.x;
      model.position.z = targetZ - center.z;
      model.position.y = floatY - center.y + sizeScaled.y * 0.5;

      // Материалы — принимаем освещение сцены
      model.traverse(child => {
        if(child.isMesh){
          child.castShadow = true;
          child.receiveShadow = true;
          if(child.material) child.material.needsUpdate = true;
        }
      });

      scene.add(model);
      spinners.push(model); // вращается в animate()

      // Убираем заглушку-геометрию с первой тумбы
      // (заглушка уже добавлена в spinners[0], удаляем её)
      if(spinners.length > 1){
        const placeholder = spinners[0];
        scene.remove(placeholder);
        spinners.splice(0, 1);
      }

      // Подсветка арбалета
      const aLight = new THREE.PointLight(0xffd0a0, 2.5, 4.0);
      aLight.position.set(targetX, floatY + 1.2, targetZ);
      scene.add(aLight);

      // Регистрируем для покачивания
      window._glbModels = window._glbModels || [];
      window._glbModels.push({ model, baseY: floatY, phase: 0 });
      hall2Objects.push(model);
      console.log('Арбалет загружен!');
    },
    undefined,
    (err) => { console.warn('Не удалось загрузить арбалет.glb:', err); }
  );

  // Плавное парение — добавляем в animate через отдельный массив
})();

// Робот — в углу Зала II, на полу
(function(){
  const gltfLoader3 = new THREE.GLTFLoader();
  // Угол — правая дальняя стена
  const rX = HALL2_W/2 - 1.5;
  const rZ = H2_Z - HALL2_LEN/2 + 2.0;
  gltfLoader3.load(
    'robot.glb',
    (gltf) => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      // Большой масштаб
      const scale = 2.7 / Math.max(size.x, size.y, size.z);
      model.scale.setScalar(scale);
      // Пересчитываем bbox после масштаба
      box.setFromObject(model);
      const minY = box.min.y;
      // Ставим нижнюю точку на пол (y=0)
      model.position.set(rX, -minY, rZ);
      model.rotation.y = -Math.PI / 4; // повёрнут к центру зала
      model.traverse(child => {
        if(child.isMesh){
          child.castShadow = true;
          child.receiveShadow = true;
          child.visible = true;
          if(child.material){
            const mats = Array.isArray(child.material) ? child.material : [child.material];
            mats.forEach(m=>{
              m.side = THREE.DoubleSide;
              m.transparent = false;
              m.opacity = 1;
              m.needsUpdate = true;
            });
          }
        }
      });
      model.visible = true;
      scene.add(model);
      // Подсветка
      const aLight = new THREE.PointLight(0xffd0a0, 3.0, 6.0);
      aLight.position.set(rX, 3.0, rZ);
      scene.add(aLight);
      // Принудительно показываем через 100мс — после того как updateLabel отработал
      setTimeout(()=>{ model.visible=true; }, 100);
      // Следим чтобы система видимости не скрыла робота
      window._robotModel = model;
      console.log('Робот загружен! scale:', scale.toFixed(4));
    },
    undefined,
    (err) => { console.warn('Не удалось загрузить robot.glb:', err); }
  );
})();

const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

let yaw=0, pitch=0;
const euler=new THREE.Euler(0,0,0,'YXZ');

document.getElementById('enter-btn').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('intro').style.display='none';
    document.getElementById('hud').classList.add('active');

    if(!isMobile){
      try { renderer.domElement.requestPointerLock(); } catch(e){}
    }
  },1200);
});

document.addEventListener('pointerlockchange',()=>{
  if(panelOpen || isMobile) return; // на мобиле pointer lock не используем
  isPaused=!document.pointerLockElement;
  document.getElementById('pause-screen').classList.toggle('active',isPaused&&isPlaying);
});
document.getElementById('pause-screen').addEventListener('click',()=>{
  if(isPaused&&isPlaying&&!isMobile){ try{renderer.domElement.requestPointerLock();}catch(e){} }
  else if(isMobile){ isPaused=false; }
});

document.addEventListener('mousemove',e=>{
  if(!isPlaying||isPaused||panelOpen) return;
  yaw  -=e.movementX*0.0018;
  pitch-=e.movementY*0.0018;
  pitch=Math.max(-Math.PI/3,Math.min(Math.PI/3,pitch));
});
document.addEventListener('keydown',e=>{ keys[e.code]=true; });
document.addEventListener('keyup',  e=>{ keys[e.code]=false; });

document.getElementById('panel-close').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{
  if(e.code==='Escape'&&panelOpen){ closePanel(); return; }
  if(e.code==='KeyE'&&!panelOpen&&isPlaying&&!isPaused) tryInteract();
  if(e.code==='Escape'&&isPlaying&&!panelOpen&&document.pointerLockElement) document.exitPointerLock();
});

function closePanel(){
  document.getElementById('artwork-panel').classList.remove('open');
  const vid=document.getElementById('panel-video');
  vid.pause(); vid.src=''; vid.style.display='none';
  document.getElementById('panel-img').style.display='block';
  panelOpen=false; isPaused=false;
  if(!isMobile) setTimeout(()=>{ try{renderer.domElement.requestPointerLock();}catch(e){} },80);

// RAYCASTING
// ═══════════════════════════════════════════════════════
const raycaster=new THREE.Raycaster();
const center=new THREE.Vector2(0,0);
let nearbyArtwork=null;

function checkInteraction(){
  raycaster.setFromCamera(center,camera);
  const hits=raycaster.intersectObjects(allMeshes.map(f=>f.mesh));
  const prompt=document.getElementById('interact-prompt');
  if(hits.length>0&&hits[0].distance<3.8){
    const found=allMeshes.find(f=>f.mesh===hits[0].object);
    nearbyArtwork=found?found.artwork:null;
  } else { nearbyArtwork=null; }
  prompt.style.opacity=nearbyArtwork?'1':'0';
}

function tryInteract(){
  if(!nearbyArtwork) return;
  const art=nearbyArtwork;
  document.getElementById('panel-cat').textContent=art.cat;
  document.getElementById('panel-title').textContent=art.title;
  document.getElementById('panel-desc').textContent=art.desc;
  const img=document.getElementById('panel-img');
  const vid=document.getElementById('panel-video');
  if(art.type==='video'&&art.src){
    img.style.display='none'; vid.src=art.src; vid.style.display='block'; vid.play();
  } else {
    vid.style.display='none'; img.style.display='block';
    img.src=art.src||'';
  }
  document.getElementById('artwork-panel').classList.add('open');
  panelOpen=true; document.exitPointerLock();
}

const dir3=new THREE.Vector3(), right3=new THREE.Vector3();
const SPEED=0.07;

// Дальняя граница — конец Зала II
const Z_MIN = H2_Z - HALL2_LEN/2 + 1.0;
// Ближняя граница — начало Зала I
const Z_MAX = H1_Z + HALL1_LEN/2 - 1.0;

function getXBound(z){
  if(z >= H1_Z - HALL1_LEN/2) return HALL1_W/2 - 0.4;
  return HALL2_W/2 - 0.5;
}

// Метка зала
const ROOM_LABELS=[
  { name:'Зал I · Скетчи',        zMin:H1_Z-HALL1_LEN/2, zMax:H1_Z+HALL1_LEN/2 },
  { name:'Зал II · Иллюстрации',  zMin:H2_Z-HALL2_LEN/2, zMax:H2_Z+HALL2_LEN/2 },
];

let lastLabel='';
function updateLabel(){
  const z=camera.position.z;
  let found='';
  ROOM_LABELS.forEach(r=>{ if(z>=r.zMin&&z<=r.zMax) found=r.name; });
  if(found!==lastLabel){
    lastLabel=found;
    const el=document.getElementById('room-label');
    el.style.opacity='0';
    if(found) setTimeout(()=>{ el.textContent=found; el.style.opacity='1'; },400);

    // Включаем/выключаем объекты по залам
    const inHall1 = found.includes('I') && !found.includes('II');
    const inHall2 = found.includes('II');
    const inTransit = found === ''; // между залами — показываем всё
    hall1Objects.forEach(o=>{ if(o) o.visible = inHall1 || inTransit; });
    hall2Objects.forEach(o=>{ if(o) o.visible = inHall2 || inTransit; });
    // Робот всегда виден когда загружен
    if(window._robotModel) window._robotModel.visible = true;
  }
}

// ГЛАВНЫЙ ЦИКЛ
// ═══════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  // вращение отключено

  // Покачивание GLB моделей — работает всегда
  if(window._glbModels){
    window._glbModels.forEach(fm=>{
      fm.phase += dt;
      if(fm.model && fm.model.position){
        fm.model.position.y = fm.baseY + Math.sin(fm.phase * 1.2) * 0.08;
      }
    });
  }

  if(isPlaying&&!isPaused&&!panelOpen){
    if(isMobile && window._joyPatch) applyJoystick();
    euler.set(pitch,yaw,0);
    camera.quaternion.setFromEuler(euler);
    dir3.set(0,0,0);
    camera.getWorldDirection(dir3); dir3.y=0; dir3.normalize();
    right3.crossVectors(dir3,new THREE.Vector3(0,1,0)).normalize();
    const mv=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])    mv.addScaledVector(dir3, SPEED);
    if(keys['KeyS']||keys['ArrowDown'])  mv.addScaledVector(dir3,-SPEED);
    if(keys['KeyA']||keys['ArrowLeft'])  mv.addScaledVector(right3,-SPEED);
    if(keys['KeyD']||keys['ArrowRight']) mv.addScaledVector(right3, SPEED);
    camera.position.add(mv);
    const bx=getXBound(camera.position.z);
    camera.position.x=Math.max(-bx,Math.min(bx,camera.position.x));
    camera.position.z=Math.max(Z_MIN,Math.min(Z_MAX,camera.position.z));
    camera.position.y=1.7;
    checkInteraction();
    updateLabel();
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

const joystickZone  = document.getElementById('joystick-zone');
const joystickStick = document.getElementById('joystick-stick');
const joyState = { active:false, id:null, dx:0, dy:0, startX:0, startY:0 };
const JOY_MAX = 38;

joystickZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  joyState.active=true; joyState.id=t.identifier;
  joyState.startX=t.clientX; joyState.startY=t.clientY;
}, {passive:false});

joystickZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== joyState.id) continue;
    let dx = t.clientX - joyState.startX;
    let dy = t.clientY - joyState.startY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist > JOY_MAX){ dx=dx/dist*JOY_MAX; dy=dy/dist*JOY_MAX; }
    joyState.dx=dx; joyState.dy=dy;
    joystickStick.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
}, {passive:false});

['touchend','touchcancel'].forEach(ev=>{
  joystickZone.addEventListener(ev, e=>{
    joyState.active=false; joyState.dx=0; joyState.dy=0;
    joystickStick.style.transform='translate(-50%,-50%)';
  });
});

// Инжектим джойстик в движение — патчим keys через отдельный вектор
const joyMove = { x:0, y:0 };
const _origAnimate = animate; // уже запущен, просто добавляем в цикл

// Переопределяем движение с учётом джойстика
// Уже в animate есть keys — добавим туда через виртуальные клавиши
function applyJoystick(){
  if(!joyState.active) return;
  const nx = joyState.dx / JOY_MAX; // -1..1
  const ny = joyState.dy / JOY_MAX; // -1..1

  dir3.set(0,0,0);
  camera.getWorldDirection(dir3); dir3.y=0; dir3.normalize();
  right3.crossVectors(dir3, new THREE.Vector3(0,1,0)).normalize();

  const mv = new THREE.Vector3();
  mv.addScaledVector(dir3,   -ny * SPEED * 1.4);
  mv.addScaledVector(right3,  nx * SPEED * 1.4);
  camera.position.add(mv);
  const bx = getXBound(camera.position.z);
  camera.position.x = Math.max(-bx, Math.min(bx, camera.position.x));
  camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, camera.position.z));
  camera.position.y = 1.7;
}

renderer.domElement.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    if(t.clientX > window.innerWidth * 0.35 && !lookState.active){
      lookState.active=true; lookState.id=t.identifier;
      lookState.lastX=t.clientX; lookState.lastY=t.clientY;
    }
  }
}, {passive:true});

renderer.domElement.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== lookState.id) continue;
    const dx = t.clientX - lookState.lastX;
    const dy = t.clientY - lookState.lastY;
    yaw   -= dx * LOOK_SENS;
    pitch -= dy * LOOK_SENS;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
    lookState.lastX=t.clientX; lookState.lastY=t.clientY;
  }
}, {passive:false});

renderer.domElement.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===lookState.id) lookState.active=false;
  }
});

// ── КНОПКА ВЗАИМОДЕЙСТВИЯ ──
const btnInteract = document.getElementById('btn-interact');
btnInteract.addEventListener('touchstart', e=>{
  e.preventDefault();
  tryInteract();
}, {passive:false});

// Показываем/прячем кнопку взаимодействия
const _origCheckInteraction = checkInteraction;
checkInteraction = function(){
  _origCheckInteraction();
  if(isMobile){
    btnInteract.classList.toggle('hidden', !nearbyArtwork);
  }
};
</script>

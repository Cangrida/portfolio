<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галина Гольтяпина — Выставка 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0b; color:#f0ece4; font-family:'Montserrat',sans-serif; overflow:hidden; }

/* ── OVERLAY INTRO ── */
#intro {
  position:fixed; inset:0; z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#0a0a0b;
  transition: opacity 1.2s ease;
}
#intro.fade-out { opacity:0; pointer-events:none; }

.intro-year {
  font-family:'Montserrat',sans-serif;
  font-weight:200; font-size:0.65rem;
  letter-spacing:0.5em; color:rgba(255,107,53,0.6);
  text-transform:uppercase; margin-bottom:24px;
}
.intro-title {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-size:clamp(3rem,8vw,6rem);
  letter-spacing:0.08em; color:#f0ece4;
  margin-bottom:8px; text-align:center;
}
.intro-author {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:1.1rem;
  color:rgba(240,236,228,0.45); letter-spacing:0.2em;
  margin-bottom:60px;
}
.intro-line {
  width:1px; height:60px;
  background:linear-gradient(to bottom, rgba(255,107,53,0.8), transparent);
  margin-bottom:40px;
  animation: line-grow 1.5s ease forwards;
  transform-origin: top;
}
@keyframes line-grow { from{scaleY(0); opacity:0;} to{scaleY(1); opacity:1;} }

#enter-btn {
  font-family:'Montserrat',sans-serif;
  font-weight:300; font-size:0.7rem;
  letter-spacing:0.4em; text-transform:uppercase;
  color:#f0ece4; background:transparent;
  border:1px solid rgba(255,107,53,0.5);
  padding:16px 48px; cursor:pointer;
  transition: all 0.4s ease;
  position:relative; overflow:hidden;
}
#enter-btn::before {
  content:''; position:absolute; inset:0;
  background:rgba(255,107,53,0.08);
  transform:scaleX(0); transform-origin:left;
  transition:transform 0.4s ease;
}
#enter-btn:hover { border-color:rgba(255,107,53,0.9); color:#ff6b35; }
#enter-btn:hover::before { transform:scaleX(1); }

.intro-controls {
  position:absolute; bottom:40px;
  font-size:0.6rem; letter-spacing:0.25em;
  color:rgba(240,236,228,0.25); text-align:center; line-height:2;
}
.intro-controls span { color:rgba(255,107,53,0.5); }

/* ── HUD ── */
#hud {
  position:fixed; inset:0; z-index:10;
  pointer-events:none; display:none;
}
#hud.active { display:block; }

#hud-top {
  position:absolute; top:28px; left:50%; transform:translateX(-50%);
  font-size:0.55rem; letter-spacing:0.4em; color:rgba(255,107,53,0.4);
  text-transform:uppercase;
}
#room-label {
  position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1rem; color:rgba(240,236,228,0.3); letter-spacing:0.15em;
  transition:opacity 0.5s;
}
#crosshair {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:16px; height:16px;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(255,107,53,0.5);
}
#crosshair::before { width:1px; height:100%; left:50%; }
#crosshair::after  { width:100%; height:1px; top:50%; }

#interact-prompt {
  position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
  font-size:0.6rem; letter-spacing:0.3em; color:rgba(255,107,53,0.7);
  opacity:0; transition:opacity 0.3s;
}

/* ── ARTWORK PANEL ── */
#artwork-panel {
  position:fixed; inset:0; z-index:50;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,10,11,0.92); backdrop-filter:blur(12px);
  pointer-events:none;
}
#artwork-panel.open {
  display:flex; pointer-events:all;
}
.panel-inner {
  max-width:860px; width:90%;
  display:flex; gap:48px; align-items:center;
}
.panel-img-wrap {
  flex:0 0 auto; max-width:50%;
  border:1px solid rgba(255,107,53,0.2);
  position:relative;
}
.panel-img-wrap::before {
  content:''; position:absolute; inset:-1px;
  box-shadow: inset 0 0 40px rgba(255,107,53,0.06);
}
#panel-img { width:100%; display:block; }
.panel-info { flex:1; }
.panel-cat {
  font-size:0.55rem; letter-spacing:0.4em;
  color:rgba(255,107,53,0.6); text-transform:uppercase; margin-bottom:16px;
}
.panel-title {
  font-family:'Cormorant Garamond',serif;
  font-weight:300; font-size:2.2rem; line-height:1.15;
  color:#f0ece4; margin-bottom:12px;
}
.panel-desc {
  font-size:0.75rem; line-height:1.8;
  color:rgba(240,236,228,0.5); margin-bottom:32px;
}
.panel-close {
  font-size:0.6rem; letter-spacing:0.35em;
  color:rgba(255,107,53,0.6); cursor:pointer;
  background:none; border:none; font-family:'Montserrat',sans-serif;
  text-transform:uppercase; padding:12px 0;
  transition:color 0.3s;
}
.panel-close:hover { color:#ff6b35; }

/* ── PAUSE ── */
#pause-screen {
  position:fixed; inset:0; z-index:80;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,10,11,0.7); backdrop-filter:blur(4px);
}
#pause-screen.active { display:flex; }
#pause-screen p {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:1.8rem; color:rgba(240,236,228,0.4); letter-spacing:0.1em;
}

canvas { display:block; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-year">Онлайн-выставка · 2026</div>
  <div class="intro-title">ГАЛЕРЕЯ</div>
  <div class="intro-author">Galina Goltyapina</div>
  <div class="intro-line"></div>
  <button id="enter-btn">войти</button>
  <div class="intro-controls">
    <span>W A S D</span> — движение &nbsp;·&nbsp; <span>Мышь</span> — обзор<br>
    <span>E</span> — рассмотреть работу &nbsp;·&nbsp; <span>ESC</span> — пауза
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hud-top">Galina Goltyapina · Выставка 2026</div>
  <div id="crosshair"></div>
  <div id="interact-prompt">[ E ] — рассмотреть</div>
  <div id="room-label"></div>
</div>

<!-- ARTWORK PANEL -->
<div id="artwork-panel">
  <div class="panel-inner">
    <div class="panel-img-wrap">
      <img id="panel-img" src="" alt="">
    </div>
    <div class="panel-info">
      <div class="panel-cat" id="panel-cat"></div>
      <div class="panel-title" id="panel-title"></div>
      <div class="panel-desc" id="panel-desc"></div>
      <button class="panel-close" id="panel-close">[ ESC ] закрыть</button>
    </div>
  </div>
</div>

<!-- PAUSE -->
<div id="pause-screen">
  <p>пауза · кликни чтобы продолжить</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// СКЕТЧИ — все 18 работ в одном зале
// ═══════════════════════════════════════════════════════
const ARTWORKS = [
  { id:1,  title:'Скетч · 1',   cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'1.jpg'   },
  { id:2,  title:'Скетч · 2',   cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'2.jpg'   },
  { id:3,  title:'Скетч · 3',   cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'3.jpg'   },
  { id:4,  title:'Скетч · 4',   cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'4.jpg'   },
  { id:5,  title:'Скетч · 5',   cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'5.jpg'   },
  { id:6,  title:'Скетч · S01', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s01.jpg' },
  { id:7,  title:'Скетч · S02', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s02.jpg' },
  { id:8,  title:'Скетч · S03', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s03.jpg' },
  { id:9,  title:'Скетч · S04', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s04.jpg' },
  { id:10, title:'Скетч · S05', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s05.jpg' },
  { id:11, title:'Скетч · S06', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s06.jpg' },
  { id:12, title:'Скетч · S07', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s07.jpg' },
  { id:13, title:'Скетч · S08', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s08.jpg' },
  { id:14, title:'Скетч · S09', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s09.jpg' },
  { id:15, title:'Скетч · S10', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s10.jpg' },
  { id:16, title:'Скетч · S11', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s11.jpg' },
  { id:17, title:'Скетч · S12', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s12.jpg' },
  { id:18, title:'Скетч · S13', cat:'Скетч · 2026', desc:'Скетч из серии зарисовок 2026 года.', src:'s13.jpg' },
];

// ═══════════════════════════════════════════════════════
// РАЗМЕРЫ ЗАЛА
// Скетчи вертикальные ~1182×1406 → соотношение ~0.84
// Холст: W=1.6, H=1.9 (вертикальный)
// Зал: 9 картин по длинной стене с каждой стороны
// ═══════════════════════════════════════════════════════
const AW = 1.6, AH = 1.9;          // размер холста (вертикальный)
const FRAME = 0.06;
const SPACING = 3.2;               // расстояние между центрами картин
const ROOM_W = 7;                  // ширина зала
const ROOM_H = 5;                  // высота
const ROOM_LEN = SPACING * 9 + 2; // длина зала под 9 картин

// ═══════════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.4;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080809);
scene.fog = new THREE.Fog(0x080809, 18, 40);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 60);
camera.position.set(0, 1.7, ROOM_LEN / 2 - 1.5);

// ═══════════════════════════════════════════════════════
// МАТЕРИАЛЫ
// ═══════════════════════════════════════════════════════
const matWall  = new THREE.MeshStandardMaterial({ color: 0x1c1c1f, roughness: 0.95 });
const matFloor = new THREE.MeshStandardMaterial({ color: 0x111113, roughness: 0.85 });
const matCeil  = new THREE.MeshStandardMaterial({ color: 0x0e0e10, roughness: 1.0  });
const matFrame = new THREE.MeshStandardMaterial({ color: 0x2a2215, roughness: 0.6, metalness: 0.3 });

// ═══════════════════════════════════════════════════════
// СТРОИМ ЗАЛ
// ═══════════════════════════════════════════════════════
// Пол
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_LEN), matFloor);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Потолок
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_LEN), matCeil);
ceil.rotation.x = Math.PI / 2;
ceil.position.y = ROOM_H;
scene.add(ceil);

// Длинные стены (N=дальняя торцевая, S=ближняя, E=правая длинная, W=левая длинная)
// Левая стена (W)
const wL = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_LEN, ROOM_H), matWall);
wL.rotation.y = Math.PI / 2; wL.position.set(-ROOM_W/2, ROOM_H/2, 0);
scene.add(wL);
// Правая стена (E)
const wR = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_LEN, ROOM_H), matWall);
wR.rotation.y = -Math.PI / 2; wR.position.set(ROOM_W/2, ROOM_H/2, 0);
scene.add(wR);
// Торец дальний
const wFar = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), matWall);
wFar.position.set(0, ROOM_H/2, -ROOM_LEN/2);
scene.add(wFar);
// Торец ближний (вход)
const wNear = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_H), matWall);
wNear.rotation.y = Math.PI; wNear.position.set(0, ROOM_H/2, ROOM_LEN/2);
scene.add(wNear);

// Плинтус
[-ROOM_LEN/2, ROOM_LEN/2].forEach((z, i) => {
  const s = new THREE.Mesh(new THREE.BoxGeometry(ROOM_W, 0.12, 0.04), matFrame);
  s.position.set(0, 0.06, z + (i===0 ? 0.02 : -0.02));
  s.rotation.y = i === 0 ? 0 : Math.PI;
  scene.add(s);
});

// Освещение общее — тусклое 25%
scene.add(new THREE.AmbientLight(0x1a1510, 0.25));

// Потолочные лампы вдоль зала
for (let i = 0; i < 5; i++) {
  const z = -ROOM_LEN/2 + 3 + i * (ROOM_LEN / 4.5);
  const pt = new THREE.PointLight(0xfff0d8, 0.35, 12);
  pt.position.set(0, ROOM_H - 0.3, z);
  scene.add(pt);
}

// ═══════════════════════════════════════════════════════
// РАЗМЕЩАЕМ КАРТИНЫ
// 9 штук — левая стена, 9 штук — правая стена
// ═══════════════════════════════════════════════════════
const allMeshes = []; // { mesh, artwork }
const texLoader = new THREE.TextureLoader();

function makePlaceholder(art) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 608; // ~вертикальное соотношение
  const cx = c.getContext('2d');
  cx.fillStyle = '#1a1714';
  cx.fillRect(0, 0, 512, 608);
  cx.strokeStyle = 'rgba(255,107,53,0.2)';
  cx.lineWidth = 1;
  cx.strokeRect(16, 16, 480, 576);
  cx.fillStyle = 'rgba(255,107,53,0.35)';
  cx.font = 'bold 90px serif';
  cx.textAlign = 'center';
  cx.fillText(art.id, 256, 280);
  cx.fillStyle = 'rgba(240,236,228,0.3)';
  cx.font = '22px sans-serif';
  cx.fillText(art.title, 256, 340);
  return new THREE.CanvasTexture(c);
}

function makeErrorCanvas(art) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 608;
  const cx = c.getContext('2d');
  cx.fillStyle = '#180a0a';
  cx.fillRect(0, 0, 512, 608);
  cx.fillStyle = 'rgba(255,80,50,0.6)';
  cx.font = '14px sans-serif';
  cx.textAlign = 'center';
  cx.fillText('не найден: ' + art.src, 256, 270);
  cx.fillStyle = 'rgba(255,200,150,0.5)';
  cx.font = '20px serif';
  cx.fillText(art.title, 256, 310);
  return new THREE.CanvasTexture(c);
}

function placeArtwork(art, side, zPos) {
  // side: 'L' = левая стена, 'R' = правая стена
  const isLeft = side === 'L';
  const px = isLeft ? -ROOM_W/2 + 0.04 : ROOM_W/2 - 0.04;
  const ry = isLeft ? Math.PI/2 : -Math.PI/2;
  const wallY = 2.0;

  // Рамка
  const frameGeo = new THREE.BoxGeometry(AW + FRAME*2, AH + FRAME*2, 0.05);
  const frameMesh = new THREE.Mesh(frameGeo, matFrame);
  frameMesh.position.set(px, wallY, zPos);
  frameMesh.rotation.y = ry;
  scene.add(frameMesh);

  // Холст
  const mat = new THREE.MeshStandardMaterial({ color: 0x1a1714, roughness: 0.85 });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(AW, AH), mat);
  const off = 0.04;
  mesh.position.set(px + (isLeft ? off : -off), wallY, zPos);
  mesh.rotation.y = ry;
  scene.add(mesh);

  // Загружаем текстуру
  texLoader.load(
    art.src,
    (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      mat.map = tex;
      mat.color.set(0xffffff);
      mat.needsUpdate = true;
    },
    undefined,
    () => {
      mat.map = makeErrorCanvas(art);
      mat.color.set(0xffffff);
      mat.needsUpdate = true;
    }
  );

  // Подсветка спотлайтом
  const spot = new THREE.SpotLight(0xfff0d8, 3.0, 5, Math.PI/10, 0.4, 1.5);
  spot.position.set(px + (isLeft ? 1.5 : -1.5), ROOM_H - 0.5, zPos);
  spot.target = mesh;
  scene.add(spot);
  scene.add(spot.target);

  // Табличка под картиной
  const lc = document.createElement('canvas');
  lc.width = 320; lc.height = 48;
  const lctx = lc.getContext('2d');
  lctx.fillStyle = '#1c1c1f';
  lctx.fillRect(0, 0, 320, 48);
  lctx.fillStyle = 'rgba(255,107,53,0.8)';
  lctx.font = '14px sans-serif';
  lctx.textAlign = 'center';
  lctx.fillText(art.cat, 160, 20);
  lctx.fillStyle = 'rgba(240,236,228,0.5)';
  lctx.font = '13px sans-serif';
  lctx.fillText(art.title, 160, 38);
  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9, 0.13),
    new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(lc), roughness: 0.9 })
  );
  labelMesh.position.set(px + (isLeft ? off : -off), wallY - AH/2 - 0.12, zPos);
  labelMesh.rotation.y = ry;
  scene.add(labelMesh);

  allMeshes.push({ mesh, artwork: art });
}

// Расставляем: 9 слева (чётные id) и 9 справа (нечётные)
// Позиции вдоль Z: от ROOM_LEN/2-2 до -ROOM_LEN/2+2
const startZ = ROOM_LEN/2 - 2.5;
ARTWORKS.forEach((art, i) => {
  const side = i % 2 === 0 ? 'L' : 'R';
  const idx = Math.floor(i / 2); // 0..8
  const zPos = startZ - idx * SPACING;
  placeArtwork(art, side, zPos);
});

// ═══════════════════════════════════════════════════════
// УПРАВЛЕНИЕ
// ═══════════════════════════════════════════════════════
let isPlaying = false, isPaused = false, panelOpen = false;
const keys = {};
let yaw = 0, pitch = 0;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');

document.getElementById('enter-btn').addEventListener('click', () => {
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('hud').classList.add('active');
    renderer.domElement.requestPointerLock();
    isPlaying = true;
  }, 1200);
});

document.addEventListener('pointerlockchange', () => {
  if (panelOpen) return;
  isPaused = !document.pointerLockElement;
  document.getElementById('pause-screen').classList.toggle('active', isPaused && isPlaying);
});

document.getElementById('pause-screen').addEventListener('click', () => {
  if (isPaused && isPlaying) renderer.domElement.requestPointerLock();
});

document.addEventListener('mousemove', e => {
  if (!isPlaying || isPaused || panelOpen) return;
  yaw   -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

document.getElementById('panel-close').addEventListener('click', closePanel);
document.addEventListener('keydown', e => {
  if (e.code === 'Escape' && panelOpen) { closePanel(); return; }
  if (e.code === 'KeyE' && !panelOpen && isPlaying && !isPaused) tryInteract();
  if (e.code === 'Escape' && isPlaying && !panelOpen && document.pointerLockElement) {
    document.exitPointerLock();
  }
});

function closePanel() {
  document.getElementById('artwork-panel').classList.remove('open');
  panelOpen = false;
  isPaused = false;
  setTimeout(() => renderer.domElement.requestPointerLock(), 80);
}

// ═══════════════════════════════════════════════════════
// RAYCASTING
// ═══════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const center = new THREE.Vector2(0, 0);
let nearbyArtwork = null;

function checkInteraction() {
  raycaster.setFromCamera(center, camera);
  const hits = raycaster.intersectObjects(allMeshes.map(f => f.mesh));
  const prompt = document.getElementById('interact-prompt');
  if (hits.length > 0 && hits[0].distance < 3.5) {
    const found = allMeshes.find(f => f.mesh === hits[0].object);
    nearbyArtwork = found ? found.artwork : null;
  } else {
    nearbyArtwork = null;
  }
  prompt.style.opacity = nearbyArtwork ? '1' : '0';
}

function tryInteract() {
  if (!nearbyArtwork) return;
  const art = nearbyArtwork;
  document.getElementById('panel-cat').textContent = art.cat;
  document.getElementById('panel-title').textContent = art.title;
  document.getElementById('panel-desc').textContent = art.desc;
  const img = document.getElementById('panel-img');
  img.src = art.src;
  img.style.display = 'block';
  document.getElementById('artwork-panel').classList.add('open');
  panelOpen = true;
  document.exitPointerLock();
}

// ═══════════════════════════════════════════════════════
// ДВИЖЕНИЕ
// ═══════════════════════════════════════════════════════
const dir   = new THREE.Vector3();
const right = new THREE.Vector3();
const SPEED = 0.07;
const Z_MIN = -ROOM_LEN / 2 + 1.0;
const Z_MAX =  ROOM_LEN / 2 - 1.0;
const X_MAX = ROOM_W / 2 - 0.5;

// ═══════════════════════════════════════════════════════
// ГЛАВНЫЙ ЦИКЛ
// ═══════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  clock.getDelta();

  if (isPlaying && !isPaused && !panelOpen) {
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    dir.set(0, 0, 0);
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    right.crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();

    const move = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    move.addScaledVector(dir,    SPEED);
    if (keys['KeyS'] || keys['ArrowDown'])  move.addScaledVector(dir,   -SPEED);
    if (keys['KeyA'] || keys['ArrowLeft'])  move.addScaledVector(right, -SPEED);
    if (keys['KeyD'] || keys['ArrowRight']) move.addScaledVector(right,  SPEED);

    camera.position.add(move);
    camera.position.x = Math.max(-X_MAX, Math.min(X_MAX, camera.position.x));
    camera.position.z = Math.max(Z_MIN,  Math.min(Z_MAX, camera.position.z));
    camera.position.y = 1.7;

    checkInteraction();
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

animate();
</script></html>

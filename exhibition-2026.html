// ═══════════════════════════════════════════════════════
// КОНСТАНТЫ
// ═══════════════════════════════════════════════════════
const HALL1_W = 7, HALL1_H = 5;
const SKETCH_SPACING = 3.4;
const HALL1_LEN = SKETCH_SPACING * 9 + 3;

const HALL2_W = 14, HALL2_H = 5, HALL2_LEN = 16;

const H1_Z  = 0;
const H2_Z  = -(HALL1_LEN/2 + HALL2_LEN/2);

// ═══════════════════════════════════════════════════════
// ЛЕНИВАЯ ЗАГРУЗКА ТЕКСТУР
// ═══════════════════════════════════════════════════════
const pendingTextures = [];       // { mat, src, art, worldZ }
const LOAD_RADIUS     = isMobile ? 10 : 18;   // дальность загрузки
const MAX_CONCURRENT  = isMobile ? 2  : 5;    // макс одновременных загрузок
let   activeLoads     = 0;

function loadNearbyTextures() {
  if (activeLoads >= MAX_CONCURRENT || !pendingTextures.length) return;
  const camZ = camera.position.z;

  // Сортируем: сначала ближние
  pendingTextures.sort((a, b) =>
    Math.abs(a.worldZ - camZ) - Math.abs(b.worldZ - camZ)
  );

  while (activeLoads < MAX_CONCURRENT && pendingTextures.length) {
    const item = pendingTextures[0];
    if (Math.abs(item.worldZ - camZ) > LOAD_RADIUS) break; // дальние — не грузим ещё
    pendingTextures.shift();
    activeLoads++;
    texLoader.load(
      item.src,
      (tex) => {
        tex.encoding = THREE.sRGBEncoding;
        item.mat.map = tex;
        item.mat.color.set(0xffffff);
        item.mat.needsUpdate = true;
        activeLoads--;
      },
      undefined,
      () => {
        item.mat.map = canvasFor(item.art, true);
        item.mat.color.set(0xffffff);
        item.mat.needsUpdate = true;
        activeLoads--;
      }
    );
  }
}

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
renderer.setPixelRatio(isMobile ? 1 : Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false; // выключено везде для экономии памяти
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.4;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080809);
// На мобиле туман ближе — меньше объектов рендерится
scene.fog = new THREE.Fog(0x080809, isMobile ? 15 : 20, isMobile ? 30 : 45);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.05, 80);
camera.position.set(0, 1.7, HALL1_LEN/2 - 1.5);

// ═══════════════════════════════════════════════════════
// МАТЕРИАЛЫ
// ═══════════════════════════════════════════════════════
const matWall  = new THREE.MeshStandardMaterial({ color:0x1c1c1f, roughness:0.95, side:THREE.DoubleSide });
const matFloor = new THREE.MeshStandardMaterial({ color:0x111113, roughness:0.85 });
const matCeil  = new THREE.MeshStandardMaterial({ color:0x0e0e10, roughness:1.0  });
const matFrame = new THREE.MeshStandardMaterial({ color:0x2a2215, roughness:0.6, metalness:0.3 });
const matPed   = new THREE.MeshStandardMaterial({ color:0x252525, roughness:0.7, metalness:0.1 });

// ═══════════════════════════════════════════════════════
// СТРОИМ ГЕОМЕТРИЮ ЗАЛОВ
// ═══════════════════════════════════════════════════════
function addBox(w,h,d,x,y,z,mat,ry=0){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); m.rotation.y=ry;
  m.receiveShadow=false; scene.add(m); return m;
}
function addPlane(w,d,x,y,z,mat,rx=0,ry=0){
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.position.set(x,y,z); m.rotation.x=rx; m.rotation.y=ry;
  m.receiveShadow=false; scene.add(m); return m;
}

function buildHall1(){
  const z = H1_Z;
  addPlane(HALL1_W, HALL1_LEN, 0,0,z, matFloor,-Math.PI/2);
  addPlane(HALL1_W, HALL1_LEN, 0,HALL1_H,z, matCeil,Math.PI/2);
  addPlane(HALL1_LEN,HALL1_H, -HALL1_W/2, HALL1_H/2,z, matWall, 0,Math.PI/2);
  addPlane(HALL1_LEN,HALL1_H,  HALL1_W/2, HALL1_H/2,z, matWall, 0,-Math.PI/2);

  scene.add(new THREE.AmbientLight(0x1a1510, 0.25));
  const lightCount = isMobile ? 3 : 5;
  for(let i=0; i<lightCount; i++){
    const lz = z + HALL1_LEN/2 - 2 - i*(HALL1_LEN/Math.max(lightCount-1,1));
    const pt = new THREE.PointLight(0xfff0d8, 0.3, 14);
    pt.position.set(0, HALL1_H-0.3, lz); scene.add(pt);
  }
}

function buildHall2(){
  const z = H2_Z;
  addPlane(HALL2_W, HALL2_LEN, 0,0,z, matFloor,-Math.PI/2);
  addPlane(HALL2_W, HALL2_LEN, 0,HALL2_H,z, matCeil,Math.PI/2);
  addPlane(HALL2_LEN,HALL2_H, -HALL2_W/2, HALL2_H/2,z, matWall,0,Math.PI/2);
  addPlane(HALL2_LEN,HALL2_H,  HALL2_W/2, HALL2_H/2,z, matWall,0,-Math.PI/2);
  addPlane(HALL2_W, HALL2_H, 0,HALL2_H/2,z-HALL2_LEN/2, matWall);

  const lightCount = isMobile ? 3 : 4;
  for(let i=0; i<lightCount; i++){
    const lz = z + HALL2_LEN/2 - 2.5 - i*(HALL2_LEN/Math.max(lightCount-1,1));
    const pt = new THREE.PointLight(0xfff0d8, 0.35, 16);
    pt.position.set(0, HALL2_H-0.3, lz); scene.add(pt);
  }
}

const allMeshes = [];

function canvasFor(art, error=false){
  const ratio = art.w / art.h;
  // На мобиле меньший холст для плейсхолдера
  const cw = isMobile ? 256 : 512;
  const ch = Math.round(cw/ratio);
  const c = document.createElement('canvas');
  c.width=cw; c.height=ch;
  const cx = c.getContext('2d');
  cx.fillStyle = error ? '#180a0a' : '#1a1714';
  cx.fillRect(0,0,cw,ch);
  cx.strokeStyle='rgba(255,107,53,0.2)'; cx.lineWidth=1;
  cx.strokeRect(10,10,cw-20,ch-20);
  cx.fillStyle = error ? 'rgba(255,80,50,0.6)' : 'rgba(255,107,53,0.3)';
  cx.font=`${Math.min(ch*0.18,60)}px serif`; cx.textAlign='center';
  cx.fillText(error ? '?' : art.id, cw/2, ch*0.45);
  cx.fillStyle='rgba(240,236,228,0.35)';
  cx.font=`${Math.min(ch*0.06,16)}px sans-serif`;
  cx.fillText(error ? L.notFound+art.src : artTitle(art), cw/2, ch*0.6);
  return new THREE.CanvasTexture(c);
}

function artwork3dSize(art, maxW, maxH){
  const ratio = art.w / art.h;
  let w = maxW, h = maxW/ratio;
  if(h > maxH){ h=maxH; w=maxH*ratio; }
  return { w, h };
}

function placeArtwork(art, px, py, pz, ry, maxW=2.4, maxH=2.4){
  const { w, h } = artwork3dSize(art, maxW, maxH);
  const FRAME=0.06;

  const fm = new THREE.Mesh(
    new THREE.BoxGeometry(w+FRAME*2, h+FRAME*2, 0.05), matFrame);
  fm.position.set(px,py,pz); fm.rotation.y=ry;
  scene.add(fm);

  // Стартуем с плейсхолдером
  const mat = new THREE.MeshStandardMaterial({
    map: canvasFor(art, false),
    color: 0xffffff,
    roughness: 0.85
  });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w,h), mat);
  const off = 0.035;
  const ox = ry===Math.PI/2?off:ry===-Math.PI/2?-off:0;
  const oz = ry===0?off:ry===Math.PI?-off:0;
  mesh.position.set(px+ox, py, pz+oz); mesh.rotation.y=ry;
  scene.add(mesh);

  // Добавляем в очередь ленивой загрузки
  pendingTextures.push({ mat, src: art.src, art, worldZ: pz });

  // Спотлайт — на мобиле чуть слабее
  const spot = new THREE.SpotLight(0xfff0d8, isMobile ? 1.8 : 2.5, 8, Math.PI/5, 0.25, 1);
  const sx = ry===Math.PI/2?px+2.0:ry===-Math.PI/2?px-2.0:px;
  const sz = ry===0?pz+2.0:ry===Math.PI?pz-2.0:pz;
  spot.position.set(sx, HALL1_H-0.3, sz);
  spot.target=mesh; scene.add(spot); scene.add(spot.target);

  // Табличка
  const lc=document.createElement('canvas'); lc.width=360; lc.height=52;
  const lx=lc.getContext('2d');
  lx.fillStyle='#1c1c1f'; lx.fillRect(0,0,360,52);
  lx.fillStyle='rgba(255,107,53,0.8)'; lx.font='13px sans-serif'; lx.textAlign='center';
  lx.fillText(art.cat,180,18);
  lx.fillStyle='rgba(240,236,228,0.5)'; lx.font='12px sans-serif';
  lx.fillText(artTitle(art),180,36);
  const lm=new THREE.Mesh(new THREE.PlaneGeometry(1.1,0.15),
    new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(lc),roughness:0.9}));
  lm.position.set(px+ox, py-h/2-0.13, pz+oz); lm.rotation.y=ry;
  scene.add(lm);

  allMeshes.push({mesh,artwork:art});
}

// ═══════════════════════════════════════════════════════
// ЗАЛ I — СКЕТЧИ
// ═══════════════════════════════════════════════════════
const sketchStartZ = H1_Z + HALL1_LEN/2 - 2.5;
SKETCHES.forEach((art,i)=>{
  const side = i%2===0 ? 'L' : 'R';
  const idx  = Math.floor(i/2);
  const zPos = sketchStartZ - idx*SKETCH_SPACING;
  const px   = side==='L' ? -HALL1_W/2+0.04 : HALL1_W/2-0.04;
  const ry   = side==='L' ? Math.PI/2 : -Math.PI/2;
  placeArtwork(art, px, 2.1, zPos, ry, 1.7, 2.05);
});

// ═══════════════════════════════════════════════════════

// Дальняя стена — hero
placeArtwork(ILLUSTRATIONS[0], 0, 2.2, H2_Z-HALL2_LEN/2+0.06, 0, 5.5, 3.0);
(function(){
  const heroZ = H2_Z-HALL2_LEN/2+0.06;

  const heroTarget = new THREE.Object3D();

// Левая стена
const leftIllu = [ILLUSTRATIONS[1], ILLUSTRATIONS[2], ILLUSTRATIONS[6], ILLUSTRATIONS[8]];
const leftZ    = [H2_Z+5, H2_Z+1.5, H2_Z-2.5, H2_Z-6.5];
leftIllu.forEach((art,i)=>{
  placeArtwork(art, -HALL2_W/2+0.05, 2.2, leftZ[i], Math.PI/2, 2.2, 2.6);
});

const rightIllu = [ILLUSTRATIONS[3], ILLUSTRATIONS[4], ILLUSTRATIONS[5], ILLUSTRATIONS[7]];
const rightZ    = [H2_Z+5, H2_Z+1.5, H2_Z-2, H2_Z-5.5];
rightIllu.forEach((art,i)=>{
  placeArtwork(art, HALL2_W/2-0.05, 2.2, rightZ[i], -Math.PI/2, 2.8, 1.9);
});

// ═══════════════════════════════════════════════════════
// ТУМБЫ ДЛЯ 3D
// ═══════════════════════════════════════════════════════
function buildPedestal(x,z,art){
  const cyl=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,1.0,20),matPed);
  cyl.position.set(x,0.5,z); scene.add(cyl);
  const top=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,0.05,20),matPed);
  top.position.set(x,1.02,z); scene.add(top);

  const pl=new THREE.PointLight(0xff8844,1.8,3.5);
  pl.position.set(x,2.3,z); scene.add(pl);

  const lc=document.createElement('canvas'); lc.width=512; lc.height=128;
  const lx=lc.getContext('2d');
  lx.fillStyle='#1c1c1f'; lx.fillRect(0,0,512,128);
  lx.strokeStyle='rgba(255,107,53,0.5)'; lx.lineWidth=2;
  lx.strokeRect(6,6,500,116);
  lx.fillStyle='rgba(255,107,53,0.9)'; lx.font='bold 32px Arial,sans-serif'; lx.textAlign='center';
  const words = artTitle(art).split(' ');
  let line1 = '', line2 = '';
  words.forEach(w => { if((line1+' '+w).length < 22) line1+=(line1?'  ':'')+w; else line2+=(line2?' ':'')+w; });
  if(line2){
    lx.fillText(line1, 256, 52);
    lx.fillStyle='rgba(240,236,228,0.7)'; lx.font='24px Arial,sans-serif';
    lx.fillText(line2, 256, 90);
  } else {
    lx.fillText(artTitle(art), 256, 72);
  }
  const lm=new THREE.Mesh(
    new THREE.PlaneGeometry(0.72, 0.18),
    new THREE.MeshStandardMaterial({
      map:new THREE.CanvasTexture(lc), roughness:0.8,
      emissive: new THREE.Color(0x0a0600), emissiveIntensity:0.6
    })
  );
  lm.position.set(x, 0.6, z+0.36);
  scene.add(lm);
}

buildPedestal(-4, H2_Z, PEDESTALS_3D[0]);
buildPedestal( 4, H2_Z, PEDESTALS_3D[1]);

// GLB модели — на всех устройствах, грузим с небольшой задержкой
function loadGLBModel(src, targetX, targetZ, floatY, phase) {
  const loader = new THREE.GLTFLoader();
  loader.load(src, (gltf) => {
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    model.scale.setScalar(0.8 / maxDim);
    box.setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const sizeScaled = box.getSize(new THREE.Vector3());
    model.position.x = targetX - center.x;
    model.position.z = targetZ - center.z;
    model.position.y = floatY - center.y + sizeScaled.y * 0.5;
    model.traverse(child => { if(child.isMesh){ child.castShadow=false; child.receiveShadow=false; } });
    scene.add(model);
    const aLight = new THREE.PointLight(0xffd0a0, 2.5, 4.0);
    aLight.position.set(targetX, floatY + 1.2, targetZ);
    scene.add(aLight);
    window._glbModels = window._glbModels || [];
    window._glbModels.push({ model, baseY: floatY, phase });
  }, undefined, (err) => { console.warn('GLB не загружен:', src, err); });
}

// На мобиле грузим GLB после того как текстуры стартовали (через 2с)
const glbDelay = isMobile ? 2000 : 0;
setTimeout(() => {
  loadGLBModel('арбалет.glb',        -4, H2_Z, 1.3, 0);
  loadGLBModel('сани новый год.glb',  4, H2_Z, 1.3, 1.5);
}, glbDelay);

// ═══════════════════════════════════════════════════════
// УПРАВЛЕНИЕ
// ═══════════════════════════════════════════════════════
let isPlaying=false, isPaused=false, panelOpen=false;
const keys={};
let yaw=0, pitch=0;
const euler=new THREE.Euler(0,0,0,'YXZ');

document.getElementById('enter-btn').addEventListener('click',()=>{
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('intro').style.display='none';
    document.getElementById('hud').classList.add('active');
    isPlaying=true;
    isPaused=false;
    if(!isMobile){
      try { renderer.domElement.requestPointerLock(); } catch(e){}
    }
  },1200);
});

document.addEventListener('pointerlockchange',()=>{
  if(panelOpen || isMobile) return;
  isPaused=!document.pointerLockElement;
  document.getElementById('pause-screen').classList.toggle('active',isPaused&&isPlaying);
});
document.getElementById('pause-screen').addEventListener('click',()=>{
  if(isPaused&&isPlaying&&!isMobile){ try{renderer.domElement.requestPointerLock();}catch(e){} }
  else if(isMobile){ isPaused=false; }
});

document.addEventListener('mousemove',e=>{
  if(!isPlaying||isPaused||panelOpen) return;
  yaw  -=e.movementX*0.0018;
  pitch-=e.movementY*0.0018;
  pitch=Math.max(-Math.PI/3,Math.min(Math.PI/3,pitch));
});
document.addEventListener('keydown',e=>{ keys[e.code]=true; });
document.addEventListener('keyup',  e=>{ keys[e.code]=false; });
document.addEventListener('keydown',e=>{
  if(e.code==='Escape'&&isPlaying&&!panelOpen&&document.pointerLockElement) document.exitPointerLock();
});

// ═══════════════════════════════════════════════════════
// RAYCASTING
// ═══════════════════════════════════════════════════════
const raycaster=new THREE.Raycaster();
const center2d=new THREE.Vector2(0,0);
let nearbyArtwork=null;

function checkInteraction(){
  raycaster.setFromCamera(center2d,camera);
  const hits=raycaster.intersectObjects(allMeshes.map(f=>f.mesh));
  if(hits.length>0&&hits[0].distance<3.8){
    const found=allMeshes.find(f=>f.mesh===hits[0].object);
    nearbyArtwork=found?found.artwork:null;
  } else { nearbyArtwork=null; }
}

// ═══════════════════════════════════════════════════════
// ДВИЖЕНИЕ
// ═══════════════════════════════════════════════════════
const dir3=new THREE.Vector3(), right3=new THREE.Vector3();
const SPEED=0.07;

const Z_MIN = H2_Z - HALL2_LEN/2 + 1.0;
const Z_MAX = H1_Z + HALL1_LEN/2 - 1.0;

function getXBound(z){
  if(z >= H1_Z - HALL1_LEN/2) return HALL1_W/2 - 0.4;
  return HALL2_W/2 - 0.5;
}

const ROOM_LABELS=[
  { name:L.room1, zMin:H1_Z-HALL1_LEN/2, zMax:H1_Z+HALL1_LEN/2 },
  { name:L.room2, zMin:H2_Z-HALL2_LEN/2, zMax:H2_Z+HALL2_LEN/2 },
];

let lastLabel='';
function updateLabel(){
  const z=camera.position.z;
  let found='';
  ROOM_LABELS.forEach(r=>{ if(z>=r.zMin&&z<=r.zMax) found=r.name; });
  if(found!==lastLabel){
    lastLabel=found;
    const el=document.getElementById('room-label');
    el.style.opacity='0';
    if(found) setTimeout(()=>{ el.textContent=found; el.style.opacity='1'; },400);
  }
}

// ═══════════════════════════════════════════════════════
// ГЛАВНЫЙ ЦИКЛ
// ═══════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  // Ленивая загрузка текстур
  loadNearbyTextures();

  // Покачивание GLB
  if(window._glbModels){
    window._glbModels.forEach(fm=>{
      fm.phase += dt;
      if(fm.model && fm.model.position){
        fm.model.position.y = fm.baseY + Math.sin(fm.phase * 1.2) * 0.08;
      }
    });
  }

  if(isPlaying&&!isPaused&&!panelOpen){
    if(isMobile && window._joyPatch) applyJoystick();
    euler.set(pitch,yaw,0);
    camera.quaternion.setFromEuler(euler);
    dir3.set(0,0,0);
    camera.getWorldDirection(dir3); dir3.y=0; dir3.normalize();
    right3.crossVectors(dir3,new THREE.Vector3(0,1,0)).normalize();
    const mv=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])    mv.addScaledVector(dir3, SPEED);
    if(keys['KeyS']||keys['ArrowDown'])  mv.addScaledVector(dir3,-SPEED);
    if(keys['KeyA']||keys['ArrowLeft'])  mv.addScaledVector(right3,-SPEED);
    if(keys['KeyD']||keys['ArrowRight']) mv.addScaledVector(right3, SPEED);
    camera.position.add(mv);
    const bx=getXBound(camera.position.z);
    camera.position.x=Math.max(-bx,Math.min(bx,camera.position.x));
    camera.position.z=Math.max(Z_MIN,Math.min(Z_MAX,camera.position.z));
    camera.position.y=1.7;
    checkInteraction();
    updateLabel();
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
animate();

// ═══════════════════════════════════════════════════════
// МОБИЛЬНОЕ УПРАВЛЕНИЕ
// ═══════════════════════════════════════════════════════
const joystickZone  = document.getElementById('joystick-zone');
const joystickStick = document.getElementById('joystick-stick');
const joyState = { active:false, id:null, dx:0, dy:0, startX:0, startY:0 };
const JOY_MAX = 38;

joystickZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  joyState.active=true; joyState.id=t.identifier;
  joyState.startX=t.clientX; joyState.startY=t.clientY;
}, {passive:false});

joystickZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== joyState.id) continue;
    let dx = t.clientX - joyState.startX;
    let dy = t.clientY - joyState.startY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist > JOY_MAX){ dx=dx/dist*JOY_MAX; dy=dy/dist*JOY_MAX; }
    joyState.dx=dx; joyState.dy=dy;
    joystickStick.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
}, {passive:false});

['touchend','touchcancel'].forEach(ev=>{
  joystickZone.addEventListener(ev, e=>{
    joyState.active=false; joyState.dx=0; joyState.dy=0;
    joystickStick.style.transform='translate(-50%,-50%)';
  });
});

function applyJoystick(){
  if(!joyState.active) return;
  const nx = joyState.dx / JOY_MAX;
  const ny = joyState.dy / JOY_MAX;
  dir3.set(0,0,0);
  camera.getWorldDirection(dir3); dir3.y=0; dir3.normalize();
  right3.crossVectors(dir3, new THREE.Vector3(0,1,0)).normalize();
  const mv = new THREE.Vector3();
  mv.addScaledVector(dir3,   -ny * SPEED * 1.4);
  mv.addScaledVector(right3,  nx * SPEED * 1.4);
  camera.position.add(mv);
  const bx = getXBound(camera.position.z);
  camera.position.x = Math.max(-bx, Math.min(bx, camera.position.x));
  camera.position.z = Math.max(Z_MIN, Math.min(Z_MAX, camera.position.z));
  camera.position.y = 1.7;
}
window._joyPatch = true;

// Свайп для поворота камеры — правая половина экрана
const lookState = { active:false, id:null, lastX:0, lastY:0 };
const LOOK_SENS = 0.004;

renderer.domElement.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    if(t.clientX > window.innerWidth * 0.35 && !lookState.active){
      lookState.active=true; lookState.id=t.identifier;
      lookState.lastX=t.clientX; lookState.lastY=t.clientY;
    }
  }
}, {passive:true});

renderer.domElement.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier !== lookState.id) continue;
    const dx = t.clientX - lookState.lastX;
    const dy = t.clientY - lookState.lastY;
    yaw   -= dx * LOOK_SENS;
    pitch -= dy * LOOK_SENS;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
    lookState.lastX=t.clientX; lookState.lastY=t.clientY;
  }
}, {passive:false});

renderer.domElement.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===lookState.id) lookState.active=false;
  }
});
</script>

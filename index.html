<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Галина Гольтяпина — Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1510;
            color: #f5f0e8;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Decorative Lines */
        .section-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, #9d8b6f 50%, transparent);
            margin: 80px 0;
            opacity: 0.3;
        }

        /* Header */
        header {
            padding: 40px 60px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        .hero {
            max-width: 600px;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9d8b6f;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        h1 .accent {
            color: #ff6b35;
            font-style: italic;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .btn {
            padding: 14px 32px;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            display: inline-block;
            font-weight: 500;
        }

        .btn-primary {
            background: #ff6b35;
            color: #1a1510;
            border: 2px solid #ff6b35;
        }

        .btn-primary:hover {
            background: transparent;
            color: #ff6b35;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #f5f0e8;
            border: 2px solid #f5f0e8;
        }

        .btn-secondary:hover {
            background: #f5f0e8;
            color: #1a1510;
            transform: translateY(-2px);
        }

        .social-links {
            display: flex;
            gap: 25px;
            margin-top: 35px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-links a {
            color: #9d8b6f;
            text-decoration: none;
            transition: color 0.3s;
            position: relative;
        }

        .social-links a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1px;
            background: #ff6b35;
            transition: width 0.3s;
        }

        .social-links a:hover {
            color: #ff6b35;
        }

        .social-links a:hover::after {
            width: 100%;
        }

        .skills-sidebar {
            display: flex;
            flex-direction: column;
            gap: 45px;
            min-width: 220px;
            margin-top: 140px;
        }

        .skill-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #ff6b35;
            font-weight: 400;
            margin-bottom: 8px;
            line-height: 1;
        }

        .skill-item p {
            font-size: 0.7rem;
            color: #9d8b6f;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.4;
        }

        /* About Section */
        .about-section {
            padding: 0 60px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #9d8b6f;
            margin-bottom: 50px;
        }

        .about-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 400;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        .about-title .highlight {
            color: #ff6b35;
            font-style: italic;
        }

        .about-text {
            max-width: 900px;
        }

        .about-text p {
            color: #c9bfa8;
            margin-bottom: 22px;
            font-size: 1rem;
            line-height: 1.8;
        }

        .about-text strong {
            color: #f5f0e8;
            font-weight: 500;
        }

        /* Portfolio Section */
        .portfolio-section {
            padding: 60px 60px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .portfolio-header {
            margin-bottom: 50px;
        }

        .portfolio-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .portfolio-title .accent {
            color: #ff6b35;
            font-style: italic;
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            background: transparent;
            color: #9d8b6f;
            border: 1px solid #9d8b6f;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            color: #ff6b35;
            border-color: #ff6b35;
        }

        .filter-btn.active {
            background: #ff6b35;
            color: #1a1510;
            border-color: #ff6b35;
        }

        /* Portfolio Grid */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .portfolio-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            cursor: pointer;
            border-radius: 4px;
            transition: opacity 0.3s ease;
        }

        .portfolio-item.hidden {
            display: none;
        }

        .portfolio-item img,
        .portfolio-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: brightness(0.9);
        }

        .portfolio-item:hover img,
        .portfolio-item:hover video {
            transform: scale(1.08);
            filter: brightness(1);
        }

        .portfolio-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(26, 21, 16, 0.95) 0%, rgba(26, 21, 16, 0.7) 50%, transparent 100%);
            padding: 35px 30px;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .portfolio-item:hover .portfolio-overlay {
            transform: translateY(0);
            opacity: 1;
        }

        .portfolio-overlay h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #f5f0e8;
            font-weight: 400;
        }

        .portfolio-overlay p {
            font-size: 0.8rem;
            color: #9d8b6f;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Lightbox Modal */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 3rem;
            color: #f5f0e8;
            cursor: pointer;
            transition: color 0.3s;
            font-weight: 300;
            line-height: 1;
        }

        .lightbox-close:hover {
            color: #ff6b35;
        }

        @media (max-width: 1024px) {
            header {
                flex-direction: column;
            }

            .skills-sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                padding-top: 40px;
                gap: 30px;
                margin-top: 0;
            }

            .skill-item {
                min-width: 140px;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 30px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            .about-section {
                padding: 0 30px 40px;
            }

            .portfolio-section {
                padding: 40px 30px;

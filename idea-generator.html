<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор идей / Idea Generator — cangrida.com</title>
<meta name="description" content="Free idea generator for artists and 3D artists. Characters, landscapes, interiors, fantasy, sci-fi and more. Billions of combinations.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#18181b;--bg3:#27272a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#fafafa;--text2:#a1a1aa;--text3:#52525b;
  --accent:#e8733a;--accent-bg:rgba(232,115,58,0.1);--accent-border:rgba(232,115,58,0.3);
  --green-bg:rgba(52,211,153,0.09);--green:rgba(110,231,183,0.9);
  --amber-bg:rgba(251,191,36,0.09);--amber:rgba(252,211,77,0.9);
  --blue-bg:rgba(96,165,250,0.09);--blue:rgba(147,197,253,0.9);
  --pink-bg:rgba(244,114,182,0.09);--pink:rgba(249,168,212,0.9);
  --r:10px;--rl:14px;--rp:999px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}
.wrap{width:100%;max-width:680px}
.header{text-align:center;margin-bottom:2.25rem;padding-top:.5rem;position:relative}
.header-logo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:.5rem}
.header-logo img{height:48px;width:auto;opacity:.95}
.header-sep{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(232,115,58,0.6);flex-shrink:0}
.header h1{font-size:24px;font-weight:600;letter-spacing:-.02em;margin:0;color:var(--text)}
.header p{font-size:13px;color:var(--text3)}
.lang-toggle{position:absolute;top:4px;right:0;display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rp);padding:3px}
.lang-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--rp);border:none;cursor:pointer;background:transparent;color:var(--text3);transition:all .12s;letter-spacing:.04em}
.lang-btn.on{background:var(--accent-bg);color:var(--accent)}
.lang-btn:hover:not(.on){color:var(--text2)}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.f{font-size:12px;padding:5px 12px;border-radius:var(--rp);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;user-select:none}
.f:hover{border-color:var(--accent-border);color:var(--text)}
.f.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.counter{font-size:11px;color:var(--text3);text-align:right;margin-bottom:.6rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:2rem 1.75rem;min-height:220px;display:flex;flex-direction:column;gap:1.25rem;margin-bottom:.875rem}
.card.filled{border-color:var(--border2)}
.cat-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:600}
.main-idea{font-size:21px;font-weight:600;color:var(--text);line-height:1.35;letter-spacing:-.01em;margin-top:.4rem}
.detail{font-size:13.5px;color:var(--text2);line-height:1.7;margin-top:.5rem}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:3px 10px;border-radius:var(--rp);font-weight:500}
.t-m{background:var(--green-bg);color:var(--green)}
.t-s{background:var(--amber-bg);color:var(--amber)}
.t-l{background:var(--blue-bg);color:var(--blue)}
.empty{color:var(--text3);font-size:15px;text-align:center;padding:3rem 0;align-self:center;width:100%}
.twist-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1rem;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:.875rem}
.twist-row:hover{border-color:var(--border2)}
.twist-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--pink);font-weight:600;white-space:nowrap;background:var(--pink-bg);padding:3px 8px;border-radius:var(--rp)}
.twist-text{color:var(--text);flex:1}
.actions{display:flex;gap:7px}
.btn{flex:1;padding:11px 8px;font-size:13.5px;font-family:inherit;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;font-weight:500}
.btn:hover{background:var(--bg3);color:var(--text);border-color:rgba(255,255,255,0.18)}
.btn:active{transform:scale(.98)}
.btn-main{flex:2;font-size:15px;background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.btn-main:hover{background:rgba(232,115,58,0.18);color:var(--accent)}
.btn-sm{flex:.7;font-size:12.5px}
.btn.copied{background:var(--green-bg);border-color:rgba(52,211,153,0.25);color:var(--green)}
.btn.twist-active{background:var(--pink-bg);border-color:rgba(244,114,182,0.25);color:var(--pink)}
.footer{margin-top:2.5rem;text-align:center;font-size:12px;color:var(--text3)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .18s ease}

/* ─── GUIDE SECTION ─── */
.guide-wrap{margin-top:2rem}
.guide-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  background:transparent;border:1px solid var(--border);border-radius:var(--r);
  padding:.75rem 1rem;cursor:pointer;font-family:inherit;
  color:var(--text3);font-size:12.5px;font-weight:500;
  transition:border-color .15s, color .15s;
  letter-spacing:.01em;
}
.guide-toggle:hover{border-color:var(--border2);color:var(--text2)}
.guide-toggle i{font-size:14px;transition:transform .2s}
.guide-toggle.open i.ti-chevron-down{transform:rotate(180deg)}
.guide-body{
  display:none;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);
  padding:1rem;
  background:var(--bg2);
}
.guide-body.open{display:block}
.guide-steps{display:flex;flex-direction:column;gap:8px}
.g-step{display:flex;align-items:flex-start;gap:12px;padding:.75rem .875rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;transition:border-color .15s}
.g-step:hover{border-color:var(--border2)}
.g-num{width:24px;height:24px;border-radius:50%;background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.g-body{flex:1}
.g-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:.2rem;line-height:1.3}
.g-desc{font-size:12px;color:var(--text2);line-height:1.6}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:999px;vertical-align:middle;position:relative;top:-1px}
.chip-acc{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent)}
.chip-pink{background:var(--pink-bg);color:var(--pink)}
.chip-dark{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.g-divider{border:none;border-top:1px solid var(--border);margin:.875rem 0}
.g-tip{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:.65rem .875rem;font-size:12px;color:var(--text2);line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.g-tip i{color:var(--accent);font-size:15px;flex-shrink:0;margin-top:1px}
/* ─────────────────────── */

@media(max-width:500px){
  .header h1{font-size:20px}
  .main-idea{font-size:17px}
  .card{padding:1.5rem 1.25rem}
  .lang-toggle{top:0;right:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-logo">
      <img src="https://cangrida.com/logo_cangrida_white.png" alt="Cangrida">

      <h1><span id="uiTitle"></span></h1>

  </div>
  <div class="filters" id="filters"></div>

  <div class="card" id="card"><div class="empty" id="emptyMsg"></div></div>

  </div>
  <div class="actions">
    <button class="btn btn-main" id="btnNew" onclick="generate()"><i class="ti ti-dice"></i> <span id="uiNew"></span></button>
    <button class="btn btn-sm" id="copyBtn" onclick="copyIdea()"><i class="ti ti-copy"></i> <span id="uiCopy"></span></button>
    <button class="btn btn-sm" id="twistBtn" onclick="toggleTwist()"><i class="ti ti-bolt"></i> <span id="uiTwist"></span></button>
  </div>

  <!-- ─── GUIDE ─── -->
  <div class="guide-wrap">
    <button class="guide-toggle" id="guideToggle" onclick="toggleGuide()">
      <span id="guideToggleLabel"><i class="ti ti-help-circle" style="font-size:14px;vertical-align:middle;margin-right:5px"></i>Как пользоваться?</span>
      <i class="ti ti-chevron-down"></i>
    </button>
    <div class="guide-body" id="guideBody">
      <div class="guide-steps">
        <div class="g-step">
          <div class="g-num">1</div>
          <div class="g-body">
            <div class="g-title" id="g1t"></div>
            <div class="g-desc" id="g1d"></div>
          </div>
        </div>
        <div class="g-step">
          <div class="g-num">2</div>
          <div class="g-body">
            <div class="g-title" id="g2t"></div>
            <div class="g-desc" id="g2d"></div>
          </div>
        </div>
        <div class="g-step">
          <div class="g-num">3</div>
          <div class="g-body">
            <div class="g-title" id="g3t"></div>
            <div class="g-desc" id="g3d"></div>
          </div>
        </div>
        <div class="g-step">
          <div class="g-num">4</div>
          <div class="g-body">
            <div class="g-title" id="g4t"></div>
            <div class="g-desc" id="g4d"></div>
          </div>
        </div>
      </div>
      <hr class="g-divider">
      <div class="g-tip">
        <i class="ti ti-language"></i>
        <span id="gTip"></span>
      </div>
    </div>
  </div>
  <!-- ─────────────── -->

  <div class="footer"><a href="https://cangrida.com" target="_blank">cangrida.com</a></div>
</div>

<script>
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1)}

// ─── CATEGORIES ───────────────────────────────────────────────────────────────

  ru:[{id:'all',label:'Всё'},{id:'char',label:'Персонажи'},{id:'scene',label:'Сцены'},{id:'land',label:'Пейзажи'},{id:'int',label:'Интерьеры'},{id:'animal',label:'Животные'},{id:'arch',label:'Архитектура'},{id:'still',label:'Натюрморт'},{id:'fantasy',label:'Фэнтези'},{id:'scifi',label:'Sci-Fi'},{id:'horror',label:'Хоррор'},{id:'myth',label:'Мифология'},{id:'post',label:'Постапок'},{id:'daily',label:'Повседневность'},{id:'abstract',label:'Абстракция'}],

};

// ─── BUILD TEMPLATES ──────────────────────────────────────────────────────────

const BUILD={
  char(p){return{s:`${cap(pick(p.who))} ${pick(p.action)} — ${pick(p.where)}`,d:pick(p.detail)}},
  scene(p){return{s:pick(p.setup),d:`${pick(p.moment)} ${pick(p.q)}`}},
  land(p){return{s:`${cap(pick(p.what))} — ${pick(p.time)}, ${pick(p.weather)}`,d:`${cap(pick(p.detail))}.`}},
  int(p){return{s:pick(p.room),d:`${pick(p.detail)} ${pick(p.feel)}`}},
  animal(p){return{s:`${pick(p.who)} ${pick(p.action)} — ${pick(p.where)}`,d:pick(p.obs)}},
  arch(p){return{s:pick(p.what),d:`${pick(p.state)} ${pick(p.detail)} ${pick(p.q)}`}},
  still(p){return{s:pick(p.obj),d:`${pick(p.ctx)} ${pick(p.q)}`}},
  fantasy(p){return{s:`${pick(p.who)} ${pick(p.situation)}`,d:pick(p.irony)}},
  scifi(p){return{s:`${pick(p.who)} ${pick(p.situation)}`,d:pick(p.impl)}},
  horror(p){return{s:pick(p.setup),d:`${pick(p.detail)} ${pick(p.wrong)}`}},
  myth(p){return{s:`${pick(p.who)} ${pick(p.situation)}`,d:`${pick(p.detail)} ${pick(p.q)}`}},
  post(p){return{s:pick(p.where),d:`${pick(p.human)} ${pick(p.point)}`}},
  daily(p){return{s:`${pick(p.who)} ${pick(p.action)} — ${pick(p.where)}`,d:pick(p.sig)}},
  abstract(p){return{s:pick(p.concept),d:pick(p.challenge)}},
};

// ─── STATE ────────────────────────────────────────────────────────────────────

let LANG='ru', active='all', twistOn=false, current=null, twistIdx=-1;

// ─── GENERATE ─────────────────────────────────────────────────────────────────

function generate(){
  const keys=Object.keys(POOLS);
  const key=active==='all'?keys[Math.floor(Math.random()*keys.length)]:active;
  const p=POOLS[key][LANG];
  const idea=BUILD[key](p);
  const m=MODS[LANG];
  current={...idea,cat:GEN_LABELS[key][LANG],mood:pick(m.moods),style:pick(m.styles),light:pick(m.lights)};
  const card=document.getElementById('card');
  card.className='card filled';
  card.innerHTML=`<div class="anim"><div class="cat-badge"><i class="ti ti-tag" style="font-size:11px"></i>${current.cat}</div><div class="main-idea">${current.s}</div><div class="detail">${current.d}</div></div><div class="tags anim"><span class="tag t-m">${current.mood}</span><span class="tag t-l">${current.light}</span></div>`;
  if(twistOn) newTwist();
}

function newTwist(){
  const arr=TWISTS[LANG];
  twistIdx=Math.floor(Math.random()*arr.length);
  document.getElementById('twistText').textContent=arr[twistIdx];
}

function toggleTwist(){
  twistOn=!twistOn;
  document.getElementById('twistRow').style.display=twistOn?'flex':'none';
  const btn=document.getElementById('twistBtn');
  if(twistOn){btn.classList.add('twist-active');newTwist();}
  else btn.classList.remove('twist-active');
}

function copyIdea(){
  if(!current) return;
  const u=UI[LANG];
  const t=`${current.s}\n${current.d}\n\n${LANG==='ru'?'Настроение':'Mood'}: ${current.mood} · ${LANG==='ru'?'Стиль':'Style'}: ${current.style} · ${LANG==='ru'?'Освещение':'Light'}: ${current.light}`+(twistOn&&twistIdx>-1?`\n${LANG==='ru'?'Вызов':'Challenge'}: `+TWISTS[LANG][twistIdx]:'');
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('copyBtn');
    b.classList.add('copied');
    b.innerHTML=`<i class="ti ti-check"></i> ${u.copied}`;
    setTimeout(()=>{b.classList.remove('copied');b.innerHTML=`<i class="ti ti-copy"></i> <span id="uiCopy">${u.copy}</span>`;},1800);
  });
}

// ─── GUIDE TOGGLE ─────────────────────────────────────────────────────────────

function toggleGuide(){
  const body=document.getElementById('guideBody');
  const toggle=document.getElementById('guideToggle');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
  if(!isOpen) renderGuide();
}

function renderGuide(){
  const g=UI[LANG].guide;
  document.getElementById('g1t').textContent=g.g1t;
  document.getElementById('g1d').innerHTML=g.g1d;
  document.getElementById('g2t').textContent=g.g2t;
  document.getElementById('g2d').innerHTML=g.g2d;
  document.getElementById('g3t').textContent=g.g3t;
  document.getElementById('g3d').innerHTML=g.g3d;
  document.getElementById('g4t').textContent=g.g4t;
  document.getElementById('g4d').innerHTML=g.g4d;
  document.getElementById('gTip').innerHTML=g.tip;
}

// ─── LANGUAGE & UI ────────────────────────────────────────────────────────────

function setLang(l){
  LANG=l;
  document.getElementById('htmlRoot').lang=l;
  document.getElementById('btn-ru').className='lang-btn'+(l==='ru'?' on':'');
  document.getElementById('btn-en').className='lang-btn'+(l==='en'?' on':'');
  renderAll();
  if(current) generate();
}

function renderAll(){
  const u=UI[LANG];
  document.getElementById('uiTitle').textContent=u.title;
  document.getElementById('uiSubtitle').textContent=u.subtitle;
  document.getElementById('uiNew').textContent=u.new;
  document.getElementById('uiCopy').textContent=u.copy;
  document.getElementById('uiTwist').textContent=u.twist;
  document.getElementById('twistLabel').textContent=u.twist.toUpperCase();
  document.getElementById('emptyMsg').textContent=u.hint;
  document.getElementById('guideToggleLabel').innerHTML=`<i class="ti ti-help-circle" style="font-size:14px;vertical-align:middle;margin-right:5px"></i>${u.guideToggle}`;
  const m=MODS[LANG];
  const tw=TWISTS[LANG];
  document.getElementById('counter').textContent=u.counter(tw.length,m.moods.length,m.styles.length,3);
  renderFilters();
  if(document.getElementById('guideBody').classList.contains('open')) renderGuide();
  if(twistOn&&twistIdx>-1) document.getElementById('twistText').textContent=TWISTS[LANG][Math.floor(Math.random()*TWISTS[LANG].length)];
}

function renderFilters(){
  document.getElementById('filters').innerHTML=CATS[LANG].map(c=>
    `<span class="f${c.id===active?' on':''}" onclick="setcat('${c.id}')">${c.label}</span>`
  ).join('');
}

function setcat(id){active=id;renderFilters();generate();}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
